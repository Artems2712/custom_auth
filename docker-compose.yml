services:
  db:
    image: postgres:16
    container_name: custom_auth_db
    environment:
      POSTGRES_DB: auth_project
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_project"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: custom_auth_api
    command: sh -c "python manage.py migrate && python manage.py seed_demo_data && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_DB: auth_project
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: change-me-too
      JWT_ACCESS_TTL_MINUTES: 30
      JWT_REFRESH_TTL_DAYS: 7
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
